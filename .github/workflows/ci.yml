name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.23.0'

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: OPENHOOF_A2UI_SKIP_MISSING=1 pnpm build:docker && pnpm build:plugin-sdk:dts && pnpm plugin-sdk:sync-exports

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsgo || true

      - name: Test
        timeout-minutes: 15
        run: OPENHOOF_TEST_PROFILE=low pnpm test:fast --reporter=verbose --bail 3 --testTimeout 30000 src/config src/plugins/install.test.ts src/infra/state-migrations.test.ts src/agents src/cron
