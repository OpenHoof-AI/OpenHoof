name: Auto-merge agent PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge if CI passes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Auto-merge agent PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            });

            for (const pr of prs) {
              // Only auto-merge PRs from agent branches
              const isAgentBranch = pr.head.ref.startsWith('agent/') ||
                                    pr.head.ref.startsWith('ket/') ||
                                    pr.head.ref.startsWith('auto/');
              if (!isAgentBranch) continue;

              // Check all checks passed
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });

              const allPassed = checks.check_runs.every(
                c => c.status === 'completed' && c.conclusion === 'success'
              );

              if (allPassed) {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                  commit_message: `Auto-merged by OpenHoof CI\n\n${pr.body || ''}`
                });
                core.info(`Auto-merged PR #${pr.number}: ${pr.title}`);
              }
            }
