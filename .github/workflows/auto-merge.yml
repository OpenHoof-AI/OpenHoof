name: Auto-merge agent PRs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge if CI passed
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Find and auto-merge eligible PR
        env:
          GH_TOKEN: ${{ secrets.AGENT_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Only act on agent/ket/auto branches
          if [[ ! "$BRANCH" =~ ^(agent|ket|auto)/ ]]; then
            echo "Branch '$BRANCH' not eligible for auto-merge. Skipping."
            exit 0
          fi

          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json number --jq '.[0].number // empty')

          if [[ -z "$PR_NUMBER" ]]; then
            echo "No open PR found for branch '$BRANCH'. Skipping."
            exit 0
          fi

          echo "Merging PR #$PR_NUMBER on branch $BRANCH"
          gh pr merge "$PR_NUMBER" \
            --repo "$REPO" \
            --squash \
            --auto \
            --delete-branch
