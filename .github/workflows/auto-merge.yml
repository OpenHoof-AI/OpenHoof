name: Auto-merge agent PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge on agent PRs
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'agent/') ||
      startsWith(github.head_ref, 'ket/') ||
      startsWith(github.head_ref, 'auto/')
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --subject "${{ github.event.pull_request.title }} (#${{ github.event.pull_request.number }})"
